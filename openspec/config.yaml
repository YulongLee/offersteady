schema: spec-driven

context: |
  Product: OfferSteady（面试稳），面向求职者的 AI 面试辅助产品。
  Stage: 产品原型与 MVP 验证；技术栈尚未最终确定。
  Core journey: 上传简历和 JD，可选维护知识库，进入面试会话，在实时回答区域获得建议，也可通过截图处理笔试或系统设计问题。
  Privacy: 简历、JD、音频、截图和知识材料属于敏感数据；默认最小化保存，测试数据必须合成或脱敏。
  Product boundary: 不鼓励隐蔽录音、欺骗或违反面试规则的使用；AI 输出必须标记为建议并避免虚构候选人经历。
  Engineering: 外部模型、语音、解析和检索能力使用可替换适配器；密钥不得放在客户端。

rules:
  proposal:
    - 明确 MVP 范围和非目标，避免未经确认扩展功能。
    - 涉及音频、截图或个人资料时说明隐私影响。
  specs:
    - 每项要求至少包含一个可测试的 WHEN/THEN 场景。
    - 区分原始资料、AI 推断和生成建议。
  design:
    - 记录替代方案以及选择当前方案的理由。
    - 外部 AI、语音和检索供应商必须保持可替换。
  tasks:
    - 按依赖顺序拆分，每项任务必须可独立验证。
    - AI 行为变更必须包含评测任务。
